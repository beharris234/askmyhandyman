<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06060d">
<title>PrivateBlast — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#06060d;color:#eeeef8;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.mark{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#b496ff,#ff6eb4);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 60px rgba(180,150,255,.3)}
.title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300}
.sub{font-size:12px;color:#545468;line-height:1.8;max-width:280px}
.btn{margin-top:10px;padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,#b496ff,#ff6eb4);border:none;color:#fff;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
.btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">📡</div>
  <div class="title">You're Offline</div>
  <div class="sub">PrivateBlast needs a connection to send blasts and sync your contacts. Your data is safe.</div>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
